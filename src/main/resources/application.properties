spring.application.name=java-train-be

# ============================================
# MySQL Configuration (fill in your credentials)
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/student_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=120000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# ============================================
# JWT Configuration
# ============================================
jwt.secret=VGhpc0lzQVZlcnlTZWN1cmVTZWNyZXRLZXlGb3JKV1RUb2tlblNpZ25pbmdIUzI1Ng==
jwt.expiration=3600000

# ============================================
# Security Toggle (true = JWT required, false = all open)
# ============================================
app.security.enabled=true

# ============================================
# Spring Batch
# ============================================
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# ============================================
# OpenAPI / Swagger
# ============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================
# Server
# ============================================
server.port=8080
