version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: student-mysql
    environment:
      MYSQL_ROOT_PASSWORD: changeme
      MYSQL_DATABASE: student_db
      MYSQL_USER: mysql-db
      MYSQL_PASSWORD: changeme         # Fill in your MySQL password
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: student-adminer
    ports:
      - "8081:8080"
    depends_on:
      - mysql

volumes:
  mysql-data:
